<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkgist</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
    <script>
      if (isNotLocalhost()) {
        fetchWithTimeout("https://api.counterapi.dev/v2/pongo-github-io/checkgist/up");
        fetchWithTimeout("https://abacus.jasoncameron.dev/hit/pongo.github.io/checkgist");
      }

      function isNotLocalhost() {
        const hostname = window.location.hostname;

        const localhostPatterns = [
          "localhost",
          "127.0.0.1",
          "[::1]", // IPv6 localhost
          "0.0.0.0",
        ];

        return !localhostPatterns.includes(hostname);
      }

      async function fetchWithTimeout(url, timeout = 5000) {
        try {
          const response = await fetch(url, {
            signal: AbortSignal.timeout(timeout),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          return response.json();
        } catch (error) {
          console.error("Fetch error:", error);
          return null;
        }
      }
    </script>
  </body>
</html>
